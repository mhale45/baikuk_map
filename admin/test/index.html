    <!-- [ADD] 직원 패널 -->
    <div id="staff-col" class="bg-gray-100 w-[9.5%] pt-[5rem] shadow-right relative z-[10] text-left">
      <div id="naver-link" class="grade-header text-center"
        style="margin: 0.5rem; background-color: #03c75a; color: white; cursor: pointer;">
        네이버
      </div>
      <div id="staff-list" class="overflow-y-auto">

    </div>
    <section id="employee-listings-panel" class="employee-listings-panel"
      style="display:none; margin-top: 0.5rem; margin-left: 0.5rem;">
      <!-- [ADD] 네이버 필터 영역 -->
      <div id="naver-filter-container" style="display:none; flex-direction: column; margin-bottom: 12px; gap: 8px;">
        <!-- 두 번째 줄: 숫자형 조건 필터 -->
        <div style="display:flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;" class="text-sm">

          <!-- 주소 -->

            <input type="text" id="input-naver-address-exclude" placeholder="제외 단어 콤마(,)로 구분"

          <!-- 보증금 -->

              class="w-[70px] border border-gray-300 rounded px-2 py-1 outline-none focus:border-green-500" />
          </div>

          <!-- 월세 -->
          <div class="flex flex-col gap-1">
            <span class="font-semibold text-gray-700">월세</span>
            <input type="number" id="input-naver-rent-min" placeholder="이상"
              class="w-[70px] border border-gray-300 rounded px-2 py-1 outline-none focus:border-green-500" />
            <input type="number" id="input-naver-rent-max" placeholder="이하"
              class="w-[70px] border border-gray-300 rounded px-2 py-1 outline-none focus:border-green-500" />
          </div>

          <!-- 전용면적 -->
          <div class="flex flex-col gap-1">

            <input type="number" id="input-naver-area-max" placeholder="이하"
              class="w-[70px] border border-gray-300 rounded px-2 py-1 outline-none focus:border-green-500" />
          </div>

          <!-- 층 -->
          <div class="flex flex-col gap-1">
            <span class="font-semibold text-gray-700">층</span>

              class="w-[70px] border border-gray-300 rounded px-2 py-1 outline-none focus:border-green-500" />
            <input type="number" id="input-naver-floor-max" placeholder="이하"
              class="w-[70px] border border-gray-300 rounded px-2 py-1 outline-none focus:border-green-500" />
          </div>

          <!-- 선택형 -->
          <div class="flex flex-col gap-1">
            <button id="btn-naver-distinct"
              class="px-3 py-1 bg-white border border-gray-300 rounded hover:bg-yellow-100 text-sm font-semibold transition-colors">
              중복제거
            </button>
            <button id="btn-naver-address-search"
              class="px-4 py-1.5 ml-2 bg-green-500 text-white rounded hover:bg-green-600 font-semibold transition-colors shadow-sm">

            </button>

        </div>
      </div>
      <div id="employee-listings-meta" style="font-size:13px; color:#666; margin-bottom:8px;"></div>
      <div id="employee-listings" style="overflow-x:auto; overflow-y:auto; max-width:100rem; max-height:47.0rem;">
        <!-- 매물 카드가 여기에 렌더링됩니다 -->
      </div>
    </section>

    <!-- 어두운 오버레이 -->
    <div id="sales-overlay" class="fixed inset-0 bg-black/30 z-[900] hidden"></div>
  </div>

  <script type="module">
    import { initAdCensorship } from './ad_censorship.js';
    initAdCensorship();

    // 광고 검열용 예시: 필터 이벤트 수신
    document.addEventListener('adc:filter-change', (e) => {
      const { staffId, affiliation } = e.detail || {};
      // TODO: staffId/affiliation에 맞춰 우측 리스트 쿼리/필터 갱신
      // console.log('[adc] filter changed:', { staffId, affiliation });
    });

    // [ADD] 네이버 관련 페이징 상태
    let naverOffset = 0;
    const NAVER_LIMIT = 500;
    let isNaverLoading = false;
    let hasMoreNaver = true;
    let totalNaverCount = 0;

    // [ADD] 네이버 필터 상태
    let isNaverDistinctActive = false;
    let seenCompositeKeys = new Set();
    let naverAddressFilterWord = "";
    let naverAddressExcludeWord = "";

    // [ADD] 숫자 범위 필터 상태
    let naverFilter = {
      depositMin: null, depositMax: null,
      rentMin: null, rentMax: null,
      areaMin: null, areaMax: null,
      floorMin: null, floorMax: null
    };

    // [ADD] 네이버 정렬 상태
    let naverSortColumn = null;
    let naverSortAscending = true;

    async function loadMoreNaverListings(isFirstLoad = false) {
      if (isNaverLoading || (!hasMoreNaver && !isFirstLoad)) return;

      const meta = document.getElementById('employee-listings-meta');
      const resultBox = document.getElementById('employee-listings');

      if (isFirstLoad) {
        naverOffset = 0;
        hasMoreNaver = true;
        totalNaverCount = 0;
        seenCompositeKeys.clear();
        resultBox.innerHTML = '';
        meta.textContent = '네이버 매물 불러오는 중...';
      } else {
        meta.textContent = `불러오는 중... (현재 ${totalNaverCount}건 표시 중)`;
      }

      isNaverLoading = true;

      try {
        if (!window.supabase) {
          throw new Error("Supabase is not initialized.");
        }

        let query = window.supabase
          .from('naver_rent_listings')
          .select('listing_id, feature, full_address, deposit_price, rent_price, net_area, floor_info, direction, realtor, composite_key');

        if (naverAddressFilterWord) {
          const keywords = naverAddressFilterWord.split(',').map(k => k.trim()).filter(Boolean);
          if (keywords.length > 0) {
            const orQuery = keywords.map(kw => `full_address.ilike.%${kw}%`).join(',');
            query = query.or(orQuery);
          }
        }

        if (naverAddressExcludeWord) {
          const excludeKeywords = naverAddressExcludeWord.split(',').map(k => k.trim()).filter(Boolean);
          excludeKeywords.forEach(kw => {
            query = query.not('full_address', 'ilike', `%${kw}%`);
          });
        }

        if (naverFilter.depositMin !== null) query = query.gte('deposit_price', naverFilter.depositMin);
        if (naverFilter.depositMax !== null) query = query.lte('deposit_price', naverFilter.depositMax);
        if (naverFilter.rentMin !== null) query = query.gte('rent_price', naverFilter.rentMin);
        if (naverFilter.rentMax !== null) query = query.lte('rent_price', naverFilter.rentMax);
        if (naverFilter.areaMin !== null) query = query.gte('net_area', naverFilter.areaMin);
        if (naverFilter.areaMax !== null) query = query.lte('net_area', naverFilter.areaMax);
        if (naverFilter.floorMin !== null) query = query.gte('current_floor', naverFilter.floorMin);
        if (naverFilter.floorMax !== null) query = query.lte('current_floor', naverFilter.floorMax);

        if (naverSortColumn) {
          query = query.order(naverSortColumn, { ascending: naverSortAscending });
        }

        const { data, error } = await query.range(naverOffset, naverOffset + NAVER_LIMIT - 1);

        if (error) throw error;

        if (isFirstLoad && (!data || data.length === 0)) {
          resultBox.innerHTML = '<div style="padding:8px; color:#666;">조회된 매물이 없습니다.</div>';
          meta.textContent = '최신 업데이트 기록이 없습니다 / 네이버 매물 0건';
          isNaverLoading = false;
          hasMoreNaver = false;
          return;
        }

        if (!data || data.length === 0) {
          hasMoreNaver = false;
          isNaverLoading = false;
          meta.textContent = `조회 완료 (네이버 매물 총 ${totalNaverCount}건)`;
          return;
        }

        let processedData = data;
        if (isNaverDistinctActive) {
          processedData = data.filter(item => {
            if (!item.composite_key) return true;
            if (seenCompositeKeys.has(item.composite_key)) {
              return false;
            } else {
              seenCompositeKeys.add(item.composite_key);
              return true;
            }
          });
        }

        // [ADD] baikukdbtest 내부 매물 정보 매핑
        let baikukDataMap = {};
        if (processedData.length > 0) {
          const keys = Array.from(new Set(processedData.map(item => item.composite_key ? item.composite_key.trim() : null).filter(Boolean)));

          if (keys.length > 0) {
            try {
              // 한 번에 많은 키를 in 쿼리로 넘기면 URL 길이 초과 에러가 발생할 수 있어 50개 단위로 나눕니다.
              const chunkSize = 50;
              for (let i = 0; i < keys.length; i += chunkSize) {
                const chunk = keys.slice(i, i + chunkSize);
                const { data: bData, error: bErr } = await window.supabase
                  .from('baikukdbtest')
                  .select('composite_key, listing_id, transaction_status, listing_title')
                  .in('composite_key', chunk);

                if (bErr) {
                  console.warn('baikukdbtest 조인 청크 에러:', bErr);
                  continue;
                }
                if (bData) {
                  bData.forEach(row => {
                    const rKey = row.composite_key ? row.composite_key.trim() : null;
                    if (rKey && !baikukDataMap[rKey]) {
                      baikukDataMap[rKey] = row;
                    }
                  });
                }
              }
            } catch (e) { console.warn('baikukdbtest 조인 전체 에러:', e); }
          }
        }

        let tbody;
        if (isFirstLoad) {
          const table = document.createElement('table');
          table.id = 'naver-listings-table';
          table.className = 'w-max table-auto border-collapse border border-gray-300 text-sm whitespace-nowrap';
          table.innerHTML = `
          <thead class="bg-gray-100 sticky top-0 z-10 select-none cursor-pointer">
              <tr>
                <th class="border border-gray-300 px-3 py-2 text-left bg-yellow-50">매물번호</th>
                <th class="border border-gray-300 px-3 py-2 text-left bg-yellow-50">거래상태</th>
                <th class="border border-gray-300 px-3 py-2 text-left bg-yellow-50">매물명</th>
                <th class="border border-gray-300 px-3 py-2 text-left hover:bg-gray-200" data-sort-col="listing_id">광고매물번호 <span></span></th>
                <th class="border border-gray-300 px-3 py-2 text-left hover:bg-gray-200" data-sort-col="feature">매물특징 <span></span></th>
                <th class="border border-gray-300 px-3 py-2 text-left hover:bg-gray-200" data-sort-col="full_address">주소 <span></span></th>
                <th class="border border-gray-300 px-3 py-2 text-left hover:bg-gray-200" data-sort-col="deposit_price">보증금 <span></span></th>
                <th class="border border-gray-300 px-3 py-2 text-left hover:bg-gray-200" data-sort-col="rent_price">월세 <span></span></th>
                <th class="border border-gray-300 px-3 py-2 text-left hover:bg-gray-200" data-sort-col="net_area">전용(㎡) <span></span></th>
                <th class="border border-gray-300 px-3 py-2 text-left hover:bg-gray-200" data-sort-col="floor_info">층 <span></span></th>
                <th class="border border-gray-300 px-3 py-2 text-left hover:bg-gray-200" data-sort-col="direction">방향 <span></span></th>
                <th class="border border-gray-300 px-3 py-2 text-left hover:bg-gray-200" data-sort-col="realtor">부동산 <span></span></th>
              </tr>
          </thead>
          <tbody></tbody>
          `;
          resultBox.appendChild(table);
          tbody = table.querySelector('tbody');

          const thead = table.querySelector('thead');
          thead.addEventListener('click', (e) => {
            const th = e.target.closest('th');
            if (!th) return;
            const sortCol = th.getAttribute('data-sort-col');
            if (!sortCol) return;

            // 이미 정렬 중인 열이면 방향을 반전, 아니면 새 열을 오름차순으로 정렬
            if (naverSortColumn === sortCol) {
              naverSortAscending = !naverSortAscending;
            } else {
              naverSortColumn = sortCol;
              naverSortAscending = true;
            }
            // 정렬을 변경했으므로 데이터를 처음부터 다시 불러옵니다.
            loadMoreNaverListings(true);
          });
        } else {
          tbody = document.querySelector('#naver-listings-table tbody');
        }

        // 정렬 상태 UI 업데이트 (화살표 추가/삭제)
        const ths = resultBox.querySelectorAll('th[data-sort-col]');
        ths.forEach(th => {
          const col = th.getAttribute('data-sort-col');
          const span = th.querySelector('span');
          if (span) {
            if (col === naverSortColumn) {
              span.innerHTML = naverSortAscending ? '&nbsp;▲' : '&nbsp;▼';
              span.className = 'text-green-600 text-xs';
            } else {
              span.innerHTML = '';
              span.className = '';
            }
          }
        });

        processedData.forEach(item => {
          const cKey = item.composite_key ? item.composite_key.trim() : null;
          const bInfo = cKey ? baikukDataMap[cKey] : null;

          // [ADD] 거래상태에 따른 행 색상 결정
          let bgClass = '';
          if (bInfo?.transaction_status) {
            const status = bInfo.transaction_status;
            if (status.includes('진행중')) bgClass = 'bg-green-50';
            else if (status.includes('보류')) bgClass = 'bg-red-50';
            else if (status.includes('계약완료')) bgClass = 'bg-red-100';
          }

          const tr = document.createElement('tr');
          if (bgClass) tr.className = bgClass; // 배경색 적용

          tr.innerHTML = `
            <td class="border border-gray-300 px-3 py-1">${bInfo?.listing_id ? `<a href="https://baikuk.com/item/view/${bInfo.listing_id}" target="_blank" class="text-blue-600 hover:underline">${bInfo.listing_id}</a>` : '-'}</td>
            <td class="border border-gray-300 px-3 py-1">${bInfo?.transaction_status ? bInfo.transaction_status.replace(/\s*\d{4}-\d{2}-\d{2}\s*/g, '').trim() : '-'}</td>
            <td class="border border-gray-300 px-3 py-1">
              <div class="w-[13rem] overflow-hidden text-ellipsis whitespace-nowrap" title="${bInfo?.listing_title || ''}">
                ${bInfo?.listing_title || '-'}
              </div>
            </td>
            <td class="border border-gray-300 px-3 py-1"><a href="https://new.land.naver.com/offices?ms=37.7284146,126.734902,18&articleNo=${item.listing_id || ''}" target="_blank" rel="noopener noreferrer" class="hover:underline text-green-600">${item.listing_id || '-'}</a></td>
            <td class="border border-gray-300 px-3 py-1">
              <div class="w-[15rem] overflow-hidden text-ellipsis whitespace-nowrap [text-wrap:balance] break-all" title="${item.feature || ''}">
                ${item.feature || '-'}
              </div>
            </td>
            <td class="border border-gray-300 px-3 py-1">
              <div class="flex items-center gap-1">
                ${item.full_address ? `
                  <a href="https://map.naver.com/v5/search/${encodeURIComponent(item.full_address)}" target="_blank" title="네이버 지도로 보기" class="flex-shrink-0">
                    <img src="https://sfinbtiqlfnaaarziixu.supabase.co/storage/v1/object/public/biakuk-images//naver_map_icon.png" class="w-5 h-5 rounded-sm" alt="map" />
                  </a>
                ` : ''}
                <span>${item.full_address || '-'}</span>
              </div>
            </td>
            <td class="border border-gray-300 px-3 py-1">${item.deposit_price ? Number(item.deposit_price).toLocaleString() : '-'}</td>
            <td class="border border-gray-300 px-3 py-1">${item.rent_price ? Number(item.rent_price).toLocaleString() : '-'}</td>
            <td class="border border-gray-300 px-3 py-1">${item.net_area || '-'}</td>
            <td class="border border-gray-300 px-3 py-1">${item.floor_info || '-'}</td>
            <td class="border border-gray-300 px-3 py-1">${item.direction || '-'}</td>
            <td class="border border-gray-300 px-3 py-1">${item.realtor || '-'}</td>
          `;
          tbody.appendChild(tr);
        });

        totalNaverCount += processedData.length;
        naverOffset += NAVER_LIMIT;

        if (data.length < NAVER_LIMIT) {
          hasMoreNaver = false;
        }

        if (processedData.length === 0 && data.length === NAVER_LIMIT) {
          setTimeout(() => loadMoreNaverListings(false), 50);
        }

        if (!hasMoreNaver) {
          meta.textContent = `조회 완료 (네이버 매물 총 ${totalNaverCount}건)`;
        } else {
          meta.textContent = `조회 중 (현재 ${totalNaverCount}건 표시)`;
        }

      } catch (err) {
        console.error(err);
        meta.textContent = '매물 조회 중 오류가 발생했습니다.';
      } finally {
        isNaverLoading = false;
      }
    }

    // [ADD] 중복제거 버튼 이벤트
    document.getElementById('btn-naver-distinct').addEventListener('click', (e) => {
      isNaverDistinctActive = !isNaverDistinctActive;
      const btn = e.target;
      if (isNaverDistinctActive) {
        btn.classList.add('bg-yellow-200', 'border-yellow-400');
        btn.classList.remove('bg-white', 'border-gray-300');
      } else {
        btn.classList.remove('bg-yellow-200', 'border-yellow-400');
        btn.classList.add('bg-white', 'border-gray-300');
      }
      loadMoreNaverListings(true);
    });

    // [ADD] 통합 필터 검색 이벤트 (버튼 클릭 및 엔터 키 지원)
    const doNaverSearch = () => {
      naverAddressFilterWord = document.getElementById('input-naver-address').value.trim();
      naverAddressExcludeWord = document.getElementById('input-naver-address-exclude').value.trim();

      const getNum = (id) => {
        const val = document.getElementById(id).value;
        return val === '' ? null : Number(val);
      };

      naverFilter.depositMin = getNum('input-naver-deposit-min');
      naverFilter.depositMax = getNum('input-naver-deposit-max');
      naverFilter.rentMin = getNum('input-naver-rent-min');
      naverFilter.rentMax = getNum('input-naver-rent-max');
      naverFilter.areaMin = getNum('input-naver-area-min');
      naverFilter.areaMax = getNum('input-naver-area-max');
      naverFilter.floorMin = getNum('input-naver-floor-min');
      naverFilter.floorMax = getNum('input-naver-floor-max');

      loadMoreNaverListings(true);
    };

    document.getElementById('btn-naver-address-search').addEventListener('click', doNaverSearch);

    // 입력창에서 Enter 키 누르면 검색 실행
    const filterInputs = [
      'input-naver-address', 'input-naver-address-exclude', 'input-naver-deposit-min', 'input-naver-deposit-max',
      'input-naver-rent-min', 'input-naver-rent-max', 'input-naver-area-min', 'input-naver-area-max',
      'input-naver-floor-min', 'input-naver-floor-max'
    ];
    filterInputs.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') doNaverSearch();
        });
      }
    });

    // [ADD] 네이버 버튼 클릭 이벤트
    document.getElementById('naver-link').addEventListener('click', () => {
      // 선택 상태 UI 업데이트
      document.querySelectorAll('.name-item').forEach(el => el.classList.remove('bg-yellow-200'));
      document.querySelectorAll('.grade-header').forEach(h => h.classList.remove('ring-2', 'ring-yellow-400'));
      document.getElementById('naver-link').classList.add('ring-2', 'ring-yellow-400');

      const panel = document.getElementById('employee-listings-panel');
      panel.style.display = '';

      const filterContainer = document.getElementById('naver-filter-container');
      if (filterContainer) filterContainer.style.display = 'flex';

      const resultBox = document.getElementById('employee-listings');

      // 스크롤 이벤트 (무한 스크롤)
      resultBox.onscroll = () => {
        const isNaverTab = document.getElementById('naver-link').classList.contains('ring-yellow-400');
        if (!isNaverTab) return;

        // 하단에서 100px 이내로 스크롤 시 추가 로드
        if (resultBox.scrollTop + resultBox.clientHeight >= resultBox.scrollHeight - 100) {
          loadMoreNaverListings(false);
        }
      };

      loadMoreNaverListings(true);
    });

    // 직원 탭 클릭 시 네이버 탭 활성화 해제 (스크롤 이벤트 방지 차원)
    document.getElementById('staff-col').addEventListener('click', (e) => {
      if (e.target.id === 'naver-link') return; // 네이버 버튼 자체는 무시
      const el = e.target.closest('.name-item') || e.target.closest('.grade-header');
      if (el) {
        document.getElementById('naver-link').classList.remove('ring-2', 'ring-yellow-400');
        const filterContainer = document.getElementById('naver-filter-container');
        if (filterContainer) filterContainer.style.display = 'none';
      }
    });
  </script>
</body>

</html>
