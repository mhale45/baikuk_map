<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <title>광고관리</title>
  <link rel="icon" type="image/png"
    href="https://sfinbtiqlfnaaarziixu.supabase.co/storage/v1/object/public/baikuk-images-open/pabicon-baikuk-simbol.png" />
  <link rel="preconnect" href="https://sfinbtiqlfnaaarziixu.supabase.co" crossorigin>
  <link rel="dns-prefetch" href="//sfinbtiqlfnaaarziixu.supabase.co">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- [ADD] 직원 리스트용 간단 스타일 -->
  <style>
    .shadow-right {
      box-shadow: 8px 0 12px -4px rgba(0, 0, 0, 0.08);
    }

    .grade-header {
      background-color: #e5e7eb;
      color: #111827;
      font-weight: 700;
      padding: 0.5rem;
      border-radius: 0.25rem;
      margin-top: 0.5rem;
      user-select: none;
    }

    .name-item {
      font-size: 0.9rem;
      color: #374151;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      cursor: pointer;
      margin-bottom: 0.4rem;
    }

    .name-item:hover {
      background-color: #fef9c3;
    }
  </style>
</head>

<body class="w-screen overflow-x-hidden">
  <div id="toast"
    class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-4 py-2 rounded shadow-lg z-[9999] hidden">
    메시지 영역
  </div>
  <div class="absolute top-0 left-0 z-[9998] bg-white w-[13rem] h-[60px] rounded-xl">
    <img src="https://sfinbtiqlfnaaarziixu.supabase.co/storage/v1/object/public/baikuk-images-open/logotype-baikuk.png"
      alt="글씨로고" class="absolute h-11 w-auto cursor-pointer top-2 left-2 z-[9999]" onclick="location.reload()" />
  </div>
  <div class="flex min-h-screen">
    <div class="w-[6%] pt-[5rem] shadow-right text-center bg-white">
      <a href="https://baikuk.com/map">
        <div class="text-lg font-extrabold px-2 py-1 rounded hover:bg-gray-200 cursor-pointer">백억지도</div>
      </a>
      <a href="/admin/mmap/">
        <div class="text-lg font-extrabold px-2 py-1 rounded hover:bg-gray-200 cursor-pointer mb-5">백억지도</div>
      </a>
      <a href="/admin/listings/">
        <div class="text-lg font-extrabold px-2 py-1 rounded hover:bg-gray-200 cursor-pointer">매물장부</div>
      </a>
      <a href="/admin/recommend_imDae/">
        <div class="text-lg font-extrabold px-2 py-1 rounded hover:bg-gray-200 cursor-pointer">임대추천</div>
      </a>
      <a href="/admin/recommend_maeMae/">
        <div class="text-lg font-extrabold px-2 py-1 rounded hover:bg-gray-200 cursor-pointer">매매추천</div>
      </a>
      <a href="/admin/customer_manage/">
        <div class="text-lg font-extrabold px-2 py-1 rounded hover:bg-gray-200 cursor-pointer mb-5">모든고객</div>
      </a>
      <a href="/admin/ad_censorship/">
        <div
          class="bg-gray-100 border-l-4 border-gray-500 text-lg font-extrabold px-2 py-1 rounded hover:bg-gray-200 cursor-pointer">
          광고관리</div>
      </a>
      <a href="/admin/staff_manage/">
        <div class="text-lg font-extrabold px-2 py-1 rounded hover:bg-gray-200 cursor-pointer">직원정보</div>
      </a>
      <a href="/admin/performance/">
        <div class="text-lg font-extrabold px-2 py-1 rounded hover:bg-gray-200 cursor-pointer">매출</div>
      </a>
      <a href="/admin/cost_management/">
        <div class="text-lg font-extrabold px-2 py-1 rounded hover:bg-gray-200 cursor-pointer">비용</div>
      </a>
      <a id="settlement-tab" href="/admin/settlement/" style="display:none">
        <div class="text-lg font-extrabold px-2 py-1 rounded hover:bg-gray-200 cursor-pointer mb-5">정산</div>
      </a>
    </div>

    <!-- [ADD] 직원 패널 -->
    <div id="staff-col" class="bg-gray-100 w-[9.5%] pt-[5rem] shadow-right relative z-[10] text-left">
      <div id="naver-link" class="grade-header text-center"
        style="margin: 0.5rem; background-color: #03c75a; color: white; cursor: pointer;">
        네이버
      </div>
      <div id="staff-list" class="overflow-y-auto">
        <!-- JS로 렌더링 -->
      </div>
    </div>
    <section id="employee-listings-panel" class="employee-listings-panel"
      style="display:none; margin-top: 0.5rem; margin-left: 0.5rem;">
      <div id="employee-listings-meta" style="font-size:13px; color:#666; margin-bottom:8px;"></div>
      <div id="employee-listings" style="overflow-x:auto; overflow-y:auto; max-width:100rem; max-height:50.0rem;">
        <!-- 매물 카드가 여기에 렌더링됩니다 -->
      </div>
    </section>

    <!-- 어두운 오버레이 -->
    <div id="sales-overlay" class="fixed inset-0 bg-black/30 z-[900] hidden"></div>
  </div>

  <script type="module">
    import { initAdCensorship } from './ad_censorship.js';
    initAdCensorship();

    // 광고 검열용 예시: 필터 이벤트 수신
    document.addEventListener('adc:filter-change', (e) => {
      const { staffId, affiliation } = e.detail || {};
      // TODO: staffId/affiliation에 맞춰 우측 리스트 쿼리/필터 갱신
      // console.log('[adc] filter changed:', { staffId, affiliation });
    });

    // [ADD] 네이버 관련 페이징 상태
    let naverOffset = 0;
    const NAVER_LIMIT = 500;
    let isNaverLoading = false;
    let hasMoreNaver = true;
    let totalNaverCount = 0;

    async function loadMoreNaverListings(isFirstLoad = false) {
      if (isNaverLoading || (!hasMoreNaver && !isFirstLoad)) return;

      const meta = document.getElementById('employee-listings-meta');
      const resultBox = document.getElementById('employee-listings');

      if (isFirstLoad) {
        naverOffset = 0;
        hasMoreNaver = true;
        totalNaverCount = 0;
        resultBox.innerHTML = '';
        meta.textContent = '네이버 매물 불러오는 중...';
      } else {
        meta.textContent = `불러오는 중... (현재 ${totalNaverCount}건 표시 중)`;
      }

      isNaverLoading = true;

      try {
        if (!window.supabase) {
          throw new Error("Supabase is not initialized.");
        }

        const { data, error } = await window.supabase
          .from('naver_rent_listings')
          .select('listing_id, feature, full_address, deposit_price, rent_price, net_area, floor_info, realtor')
          .range(naverOffset, naverOffset + NAVER_LIMIT - 1);

        if (error) throw error;

        if (isFirstLoad && (!data || data.length === 0)) {
          resultBox.innerHTML = '<div style="padding:8px; color:#666;">조회된 매물이 없습니다.</div>';
          meta.textContent = '최신 업데이트 기록이 없습니다 / 네이버 매물 0건';
          isNaverLoading = false;
          hasMoreNaver = false;
          return;
        }

        if (!data || data.length === 0) {
          hasMoreNaver = false;
          isNaverLoading = false;
          meta.textContent = `조회 완료 (네이버 매물 총 ${totalNaverCount}건)`;
          return;
        }

        let tbody;
        if (isFirstLoad) {
          const table = document.createElement('table');
          table.id = 'naver-listings-table';
          table.className = 'w-max table-auto border-collapse border border-gray-300 text-sm whitespace-nowrap';
          table.innerHTML = `
          <thead class="bg-gray-100 sticky top-0 z-10">
              <tr>
                <th class="border border-gray-300 px-3 py-2 text-left">광고매물번호</th>
                <th class="border border-gray-300 px-3 py-2 text-left">매물특징</th>
                <th class="border border-gray-300 px-3 py-2 text-left">주소</th>
                <th class="border border-gray-300 px-3 py-2 text-left">보증금</th>
                <th class="border border-gray-300 px-3 py-2 text-left">월세</th>
                <th class="border border-gray-300 px-3 py-2 text-left">전용면적(㎡)</th>
                <th class="border border-gray-300 px-3 py-2 text-left">층</th>
                <th class="border border-gray-300 px-3 py-2 text-left">부동산</th>
              </tr>
          </thead>
          <tbody></tbody>
          `;
          resultBox.appendChild(table);
          tbody = table.querySelector('tbody');
        } else {
          tbody = document.querySelector('#naver-listings-table tbody');
        }

        data.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="border border-gray-300 px-3 py-1"><a href="https://new.land.naver.com/offices?ms=37.7284146,126.734902,18&articleNo=${item.listing_id || ''}" target="_blank" rel="noopener noreferrer" class="hover:underline text-green-600">${item.listing_id || '-'}</a></td>
            <td class="border border-gray-300 px-3 py-1">
              <div class="w-[15rem] overflow-hidden text-ellipsis whitespace-nowrap [text-wrap:balance] break-all" title="${item.feature || ''}">
                ${item.feature || '-'}
              </div>
            </td>
            <td class="border border-gray-300 px-3 py-1">${item.full_address || '-'}</td>
            <td class="border border-gray-300 px-3 py-1">${item.deposit_price || '-'}</td>
            <td class="border border-gray-300 px-3 py-1">${item.rent_price || '-'}</td>
            <td class="border border-gray-300 px-3 py-1">${item.net_area || '-'}</td>
            <td class="border border-gray-300 px-3 py-1">${item.floor_info || '-'}</td>
            <td class="border border-gray-300 px-3 py-1">${item.realtor || '-'}</td>
          `;
          tbody.appendChild(tr);
        });

        totalNaverCount += data.length;
        naverOffset += NAVER_LIMIT;

        if (data.length < NAVER_LIMIT) {
          hasMoreNaver = false;
        }

        if (!hasMoreNaver) {
          meta.textContent = `조회 완료 (네이버 매물 총 ${totalNaverCount}건)`;
        } else {
          meta.textContent = `조회 중 (현재 ${totalNaverCount}건 표시)`;
        }

      } catch (err) {
        console.error(err);
        meta.textContent = '매물 조회 중 오류가 발생했습니다.';
      } finally {
        isNaverLoading = false;
      }
    }

    // [ADD] 네이버 버튼 클릭 이벤트
    document.getElementById('naver-link').addEventListener('click', () => {
      // 선택 상태 UI 업데이트
      document.querySelectorAll('.name-item').forEach(el => el.classList.remove('bg-yellow-200'));
      document.querySelectorAll('.grade-header').forEach(h => h.classList.remove('ring-2', 'ring-yellow-400'));
      document.getElementById('naver-link').classList.add('ring-2', 'ring-yellow-400');

      const panel = document.getElementById('employee-listings-panel');
      panel.style.display = '';

      const resultBox = document.getElementById('employee-listings');

      // 스크롤 이벤트 (무한 스크롤)
      resultBox.onscroll = () => {
        const isNaverTab = document.getElementById('naver-link').classList.contains('ring-yellow-400');
        if (!isNaverTab) return;

        // 하단에서 100px 이내로 스크롤 시 추가 로드
        if (resultBox.scrollTop + resultBox.clientHeight >= resultBox.scrollHeight - 100) {
          loadMoreNaverListings(false);
        }
      };

      loadMoreNaverListings(true);
    });

    // 직원 탭 클릭 시 네이버 탭 활성화 해제 (스크롤 이벤트 방지 차원)
    document.getElementById('staff-col').addEventListener('click', (e) => {
      if (e.target.id === 'naver-link') return; // 네이버 버튼 자체는 무시
      const el = e.target.closest('.name-item') || e.target.closest('.grade-header');
      if (el) {
        document.getElementById('naver-link').classList.remove('ring-2', 'ring-yellow-400');
      }
    });
  </script>
</body>

</html>
