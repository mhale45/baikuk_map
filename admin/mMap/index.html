<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>mMap</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.1, maximum-scale=5.0" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 카카오 지도 -->
    <script
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=f605c7b72dc7f3083f36483e55e2bc77&libraries=clusterer,services"></script>

    <style>
        :root {
            --header-height: 5.8rem;
        }

        body {
            margin: 0;
            padding: 0;
        }

        #map {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: #fff;
            z-index: 10000;
        }

        @media (min-width: 769px) {
            #side-panel {
                position: absolute !important;
                max-width: 320px;
                max-height: 50vh;
                left: 0;
                top: 0;
                transform: translate(-50%, -100%);
                /* 마커 위로 */
                z-index: 999999;
            }
        }

        /* 크롬, 사파리, 파이어폭스 등에서 숫자 인풋의 스핀 버튼을 제거하고 최소 너비를 해제합니다. */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
            min-width: 0;
        }
    </style>

    <!-- 🔥 Supabase Client -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.3/+esm';

        const supabaseUrl = 'https://sfinbtiqlfnaaarziixu.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNmaW5idGlxbGZuYWFhcnppaXh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI1MDkxNjEsImV4cCI6MjA2ODA4NTE2MX0.4-7vnIjbF-biWWuv9-vTxK9Y99gMm-vS6oaRMdRL5fA';

        window.supabase = createClient(supabaseUrl, supabaseKey, {
            auth: { persistSession: true, autoRefreshToken: true }
        });

        // 🔥 로그인 여부 확인 후 접속 불가하면 listings 로 이동
        async function enforceAuthForMMap() {
            const { data: { session } } = await window.supabase.auth.getSession();
            if (!session) {
                location.replace("/admin/listings/");
            }
        }

        enforceAuthForMMap();
    </script>

</head>

<body>
    <header
        class="flex flex-row items-center gap-4 w-full px-4 py-2 bg-white shadow-md border-b border-gray-200 z-[10000]">
        <!-- 왼쪽 버튼 그룹 -->
        <div class="flex flex-row items-center gap-2 shrink-0">
            <button id="filter-reset-btn"
                class="px-3 py-1.5 border border-gray-300 rounded bg-gray-100 text-sm font-medium hover:bg-gray-200 transition duration-150">
                초기화
            </button>
            <button id="toggle-customer-panel"
                class="px-3 py-1.5 border border-gray-300 rounded bg-gray-100 text-sm font-medium max-w-[260px] hover:bg-gray-200 transition duration-150">
                👤 고객 리스트
            </button>
            <button id="save-customer-filter-btn"
                class="px-3 py-1.5 border border-blue-500 rounded bg-blue-500 text-white text-sm font-bold hover:bg-blue-600 transition duration-150">
                💾 저장
            </button>
        </div>

        <!-- 🔥 상단 바 고정 통합 필터 박스 (기존 필터 버튼 대체) -->
        <div id="filter-box-merged" class="flex flex-row items-center gap-3 text-xs border border-gray-200 rounded-lg p-2 bg-gray-50/50 shrink-0">
            <!-- 진행상태 -->
            <div class="flex flex-row items-center gap-2 border-r border-gray-200 pr-3.5">
                <label class="flex items-center gap-1 cursor-pointer font-medium text-gray-700">
                    <input type="checkbox" value="진행중" class="status-check" /> 진행중
                </label>
                <label class="flex items-center gap-1 cursor-pointer font-medium text-gray-700">
                    <input type="checkbox" value="보류" class="status-check" /> 보류
                </label>
                <label class="flex items-center gap-1 cursor-pointer font-medium text-gray-700">
                    <input type="checkbox" value="계약완료" class="status-check" /> 계약완료
                </label>
            </div>
            <!-- 거래유형 -->
            <div class="flex flex-row items-center gap-2 border-r border-gray-200 pr-3.5">
                <label class="flex items-center gap-1 cursor-pointer font-medium text-gray-700">
                    <input type="checkbox" value="월세" class="dealtype-check" /> 월세
                </label>
                <label class="flex items-center gap-1 cursor-pointer font-medium text-gray-700">
                    <input type="checkbox" value="매매" class="dealtype-check" /> 매매
                </label>
            </div>
            <!-- 카테고리 -->
            <div class="flex flex-row items-center gap-2.5">
                <label class="flex items-center gap-1 cursor-pointer font-medium text-gray-700">
                    <input type="checkbox" value="상가" class="category-check" /> 상가
                </label>
                <label class="flex items-center gap-1 cursor-pointer font-medium text-gray-700">
                    <input type="checkbox" value="빌딩" class="category-check" /> 빌딩
                </label>
                <label class="flex items-center gap-1 cursor-pointer font-medium text-gray-700">
                    <input type="checkbox" value="공장" class="category-check" /> 공장·창고
                </label>
                <label class="flex items-center gap-1 cursor-pointer font-medium text-gray-700">
                    <input type="checkbox" value="주택" class="category-check" /> 주택
                </label>
            </div>
        </div>

        <!-- 오른쪽 입력 테이블 그룹 (가로 스크롤 가능) -->
        <div class="flex-1 overflow-x-auto custom-scroll">
            <table class="min-w-max text-xs border-collapse">
                <thead>
                    <tr class="text-gray-600 font-semibold bg-gray-50">
                        <th class="px-1 py-0.5 border border-gray-200 text-center w-[60px] text-[11px] leading-tight">층
                        </th>
                        <th class="px-1 py-0.5 border border-gray-200 text-center w-[60px] text-[11px] leading-tight">
                            면적(평)</th>
                        <th class="px-1 py-0.5 border border-gray-200 text-center w-[60px] text-[11px] leading-tight">
                            보증금</th>
                        <th class="px-1 py-0.5 border border-gray-200 text-center w-[60px] text-[11px] leading-tight">월세
                        </th>
                        <th class="px-1 py-0.5 border border-gray-200 text-center w-[60px] text-[11px] leading-tight">
                            평월세</th>
                        <th class="px-1 py-0.5 border border-gray-200 text-center w-[60px] text-[11px] leading-tight">
                            권리금</th>
                        <th class="px-1 py-0.5 border border-gray-200 text-center w-[60px] text-[11px] leading-tight">
                            매매가</th>
                        <th class="px-1 py-0.5 border border-gray-200 text-center w-[60px] text-[11px] leading-tight">
                            총보증금</th>
                        <th class="px-1 py-0.5 border border-gray-200 text-center w-[60px] text-[11px] leading-tight">
                            총월세</th>
                        <th class="px-1 py-0.5 border border-gray-200 text-center w-[60px] text-[11px] leading-tight">
                            수익률(%)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="floor-min" type="number"
                                placeholder="이상"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="area-min" type="number"
                                placeholder="이상"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="deposit-min" type="number"
                                placeholder="이상"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="rent-min" type="number"
                                placeholder="이상"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="rent_per_py-min" type="number"
                                placeholder="이상"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="premium-min" type="number"
                                placeholder="이상"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="sale-min" type="number"
                                placeholder="이상"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="total-deposit-min" type="number"
                                placeholder="이상"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="total-rent-min" type="number"
                                placeholder="이상"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="roi-min" type="number"
                                placeholder="이상"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                    </tr>
                    <tr>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="floor-max" type="number"
                                placeholder="이하"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="area-max" type="number"
                                placeholder="이하"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="deposit-max" type="number"
                                placeholder="이하"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="rent-max" type="number"
                                placeholder="이하"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="rent_per_py-max" type="number"
                                placeholder="이하"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="premium-max" type="number"
                                placeholder="이하"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="sale-max" type="number"
                                placeholder="이하"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="total-deposit-max" type="number"
                                placeholder="이하"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="total-rent-max" type="number"
                                placeholder="이하"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                        <td class="p-0.5 border border-gray-200 text-center"><input id="roi-max" type="number"
                                placeholder="이하"
                                class="w-[50px] p-1 border border-gray-300 rounded text-center text-xs" /></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </header>

    <!-- 오른쪽 하단 컨트롤 버튼 -->
    <div id="map-controls" class="fixed z-[11000] flex flex-col items-center bottom-10 right-5">
        <button id="btn-current-location" class="w-9 h-9 sm:w-10 sm:h-10 shadow rounded-lg flex items-center justify-center
                    border border-gray-300 bg-white hover:bg-yellow-200 transition mb-5" title="현재 위치로 이동">
            <span class="text-xl text-black font-bold">◉</span>
        </button>
    </div>


    <!-- 🔥 고객 리스트 패널 (필터창과 동일한 UI / 좌측 상단 고정) -->
    <div id="customer-panel" class="flex flex-col gap-3 text-sm border border-gray-300 rounded p-3 bg-white mt-2" style="
            display:none;
            position: fixed;
            top: calc(var(--header-height) + 10px);
            left: 10px;
            z-index: 99999;
            max-width: 380px;
            max-height: 70vh;
            overflow-y: auto;
            background: white;
            min-width: 220px;
            max-width: 90vh;
        ">
    </div>

    <div id="side-panel" style="
            position: fixed;
            top: calc(var(--header-height) + 10px);
            left: 10px;
            max-width: 95vw;
            width: auto;
            max-height: 70vh;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
            font-size: 15px;
            overflow-y: auto;
            overflow-x: auto;
            white-space: nowrap;
            z-index: 999999;
            display: none;
        ">
    </div>

    <!-- 🔍 제목 검색창 (지도 오른쪽 상단 고정) -->
    <div id="map-search-box" style="
            position: fixed;
            top: calc(var(--header-height) + 10px);
            right: 20px;
            z-index: 5000;
            background: white;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.15);
        ">

        <!-- 🔥 검색어 초기화 X 버튼 -->
        <button id="search-clear-btn" type="button" style="
                display: none;          /* 기본은 숨김, 글자 입력되면 JS에서 보이게 */
                padding: 0 8px;
                height: 30px;
                border: 1px solid #ccc;
                border-radius: 6px;
                background: #f3f3f3;
                font-size: 14px;
                cursor: pointer;
            ">
            ✕
        </button>

        <input id="search-title-input" type="text" placeholder="검색" style="
                width: 280px;
                padding: 5px 8px;
                border: 1px solid #ccc;
                border-radius: 6px;
                font-size: 14px;
            " />

        <!-- 🔄 재검색 버튼 -->
        <button id="search-refresh-btn" type="button" style="
                padding: 0 10px;
                height: 30px;
                border: 1px solid #ccc;
                border-radius: 6px;
                background: #fef3c7;   /* 연한 노랑 */
                font-size: 14px;
                cursor: pointer;
            ">
            재검색
        </button>
    </div>

    <!-- 🔍 검색 결과 리스트 -->
    <div id="search-result-box" style="
            position: fixed;
            top: calc(var(--header-height) + 60px);
            right: 20px;
            z-index: 5000;
            background: white;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.15);
            overflow-x: auto;
            overflow-y: auto;
            max-width: 380px;
            max-height: 70vh;
            display: none;
            font-size: 14px;
        ">
    </div>

    <!-- 지도 -->
    <div id="map"></div>

    <script type="module" src="./mMap.js"></script>

</body>

</html>
